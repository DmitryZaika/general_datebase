services:
  remix-app:
    restart: always
    environment:
      - NODE_ENV=production
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/50x.html:/usr/share/nginx/html/50x.html:ro
    depends_on:
      - remix-app
