# DO NOT include "http {" here.
# These settings are allowed inside the http block, so they are fine here
client_max_body_size 100M;

# 1. HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name granite-manager.com localhost;

    return 301 https://$host$request_uri;
}

# 2. Main HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name granite-manager.com localhost;

    # SSL Certs (Ensure these paths are mounted in docker-compose)
    ssl_certificate /etc/letsencrypt/live/granite-manager.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/granite-manager.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html index.htm;

    error_page 404 /404.html;
    location = /404.html { }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    location / {
        # IMPORTANT: Change 127.0.0.1 to your docker service name
        proxy_pass http://remix-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
