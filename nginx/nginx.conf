# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 100M;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;

    server {
    if ($host = granite-manager.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    # Listen on port 80 for HTTP
    listen 80;
    listen [::]:80;

    # Your domain(s)
    server_name granite-manager.com;

    # Any request to HTTP gets redirected
    return 301 https://$host$request_uri;
    

}

    server {
    # Listen on port 443 for HTTPS
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name granite-manager.com;
    root /usr/share/nginx/html;  # your web root

    # SSL cert and key from Certbot
    ssl_certificate /etc/letsencrypt/live/granite-manager.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/granite-manager.com/privkey.pem; # managed by Certbot

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # If desired, specify index file:
    index index.html index.htm;

    # error_pages, location blocks, etc.
    error_page 404 /404.html;
    location = /404.html { }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { }

        location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Пробрасывать заголовки (важно для WebSocket и корректной работы)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }





}


